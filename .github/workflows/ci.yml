name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Syntax check
        run: |
          python -m py_compile artifactlens/config.py
          python -m py_compile artifactlens/api.py
          python -m py_compile artifactlens/app.py
          python -m py_compile artifactlens/theme.py
          python -m py_compile artifactlens/settings_dialog.py
          python -m py_compile artifactlens/__main__.py

      - name: Import validation
        run: python -c "from artifactlens.app import ArtifactLensApp; print('All imports OK')"

      - name: Build executable
        run: >
          pyinstaller --onedir --noconsole --name ArtifactLens
          --hidden-import=artifactlens
          --hidden-import=artifactlens.app
          --hidden-import=artifactlens.api
          --hidden-import=artifactlens.config
          --hidden-import=artifactlens.theme
          --hidden-import=artifactlens.settings_dialog
          artifactlens/__main__.py

      - name: Verify build output
        run: Test-Path dist/ArtifactLens/ArtifactLens.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArtifactLens
          path: dist/ArtifactLens/
          retention-days: 14
